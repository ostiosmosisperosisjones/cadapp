name: Build releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean cadapp.spec

      - name: Zip output
        run: Compress-Archive -Path dist/cadapp/* -DestinationPath dist/cadapp-windows.zip

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/cadapp-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-appimage:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 libdbus-1-3 \
            libxcb-cursor0 libxcb-icccm4 libxcb-keysyms1 \
            libxcb-shape0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 fuse

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --noconfirm --clean cadapp.spec

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin
          cp -r dist/cadapp/* AppDir/usr/bin/

          cat > AppDir/cadapp.desktop << 'EOF'
          [Desktop Entry]
          Name=cadapp
          Exec=cadapp
          Icon=cadapp
          Type=Application
          Categories=Graphics;
          EOF

          # Placeholder icon (1x1 white PNG) — replace with a real one later
          python3 -c "
          import base64, pathlib
          png = base64.b64decode('iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mP8z8BQDwADhQGAWjR9awAAAABJRU5ErkJggg==')
          pathlib.Path('AppDir/cadapp.png').write_bytes(png)
          "

          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          export LD_LIBRARY_PATH="$HERE/usr/bin:$LD_LIBRARY_PATH"
          # Use system Qt platform plugins and OpenGL to avoid GLX conflicts
          export QT_QPA_PLATFORM_PLUGIN_PATH=""
          export PYINSTALLER_SUPPRESS_COMBINING_WARNINGS=1
          exec "$HERE/usr/bin/cadapp" "$@"
          EOF
          chmod +x AppDir/AppRun

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool-x86_64.AppImage AppDir cadapp-linux.AppImage

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: cadapp-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
